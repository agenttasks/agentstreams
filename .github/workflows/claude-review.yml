name: Claude Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. SECURITY REVIEW — claude-code-security-review (official)
  #    Semantic vulnerability scanning with false positive filtering.
  #    Uses Claude Opus for deep code analysis + secondary filtering pass.
  #    Docs: https://github.com/anthropics/claude-code-security-review
  # ═══════════════════════════════════════════════════════════
  claude-security:
    name: Security Review
    runs-on: ubuntu-latest
    outputs:
      findings-count: ${{ steps.security-review.outputs.findings-count }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Run security review
        id: security-review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          comment-pr: 'true'
          upload-results: 'true'
          claude-model: claude-sonnet-4-6
          claudecode-timeout: '25'
          exclude-directories: 'webapp/node_modules,webapp/out,webapp/.next,taxonomy,evals/crawl-ingest/test_data'
          custom-security-scan-instructions: '.github/security-instructions.txt'
          false-positive-filtering-instructions: '.github/fp-filtering.txt'

      - name: Summary
        if: always()
        run: |
          echo "## Security Review" >> $GITHUB_STEP_SUMMARY
          echo "- Findings: ${{ steps.security-review.outputs.findings-count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Results: ${{ steps.security-review.outputs.results-file }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: claude-sonnet-4-6" >> $GITHUB_STEP_SUMMARY
          echo "- Custom rules: .github/security-instructions.txt" >> $GITHUB_STEP_SUMMARY
          echo "- FP filtering: .github/fp-filtering.txt" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════
  # 2. CONSISTENCY REVIEW — claude-code-action (general purpose)
  #    Checks version strings, model names, cross-references, SDK patterns.
  #    Advisory only — does not block merge.
  # ═══════════════════════════════════════════════════════════
  claude-consistency:
    name: Consistency Review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CONSISTENCY REVIEW — ${{ github.repository }}#${{ github.event.pull_request.number }}

            1. Run `git diff origin/main --name-only` to find changed files.
            2. For each changed file, check:
               - Version numbers match SKILL.md
               - Model names use hyphen format (claude-opus-4-6, claude-sonnet-4-6)
               - Cross-references point to existing files
               - SDK constructor patterns are correct
               - safety-research repo star counts are consistent across files
            3. Only read files that are directly referenced by the changed files.

            Post inline comments on inconsistencies. If clean, post a brief approving comment.
          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6

  # ═══════════════════════════════════════════════════════════
  # 3. MERGE GATE — blocks on security findings
  # ═══════════════════════════════════════════════════════════
  merge-gate:
    name: Merge Gate
    needs: [claude-security, claude-consistency]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          SECURITY="${{ needs.claude-security.result }}"
          CONSISTENCY="${{ needs.claude-consistency.result }}"
          FINDINGS="${{ needs.claude-security.outputs.findings-count }}"

          echo "## Merge Gate" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${SECURITY} (${FINDINGS:-0} findings)" >> $GITHUB_STEP_SUMMARY
          echo "- Consistency: ${CONSISTENCY}" >> $GITHUB_STEP_SUMMARY

          if [ "$SECURITY" = "failure" ]; then
            echo "::error::Security review failed — check PR comments for findings"
            exit 1
          fi

          if [ -n "$FINDINGS" ] && [ "$FINDINGS" -gt 0 ] 2>/dev/null; then
            echo "::warning::${FINDINGS} security finding(s) detected — review PR comments"
          fi

          echo "::notice::Reviews complete — check PR comments for details"
