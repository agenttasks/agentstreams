name: Claude Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. SECURITY REVIEW (Required — blocks all downstream)
  # ═══════════════════════════════════════════════════════════
  claude-security:
    name: Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: review
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            SECURITY REVIEW — ${{ github.repository }}#${{ github.event.pull_request.number }}

            Run the review-security skill against the changes in this PR.

            Check every changed file for:
            1. ANTHROPIC_API_KEY usage (only allowed in "never use" warnings)
            2. Hardcoded credentials in code examples
            3. Unsafe shell patterns (unquoted vars, eval, command injection)
            4. SQL injection in SQLite examples
            5. SSRF patterns in crawler configs
            6. Path traversal in file handling

            Return a structured JSON verdict.
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-6

  # ═══════════════════════════════════════════════════════════
  # 2. CONSISTENCY REVIEW (Runs after security passes)
  # ═══════════════════════════════════════════════════════════
  claude-consistency:
    name: Consistency Review
    needs: claude-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CONSISTENCY REVIEW — ${{ github.repository }}#${{ github.event.pull_request.number }}

            Run the review-consistency skill against the changes in this PR.

            Cross-check all files in skills/crawl-ingest/ for:
            1. Version numbers consistent across SKILL.md, READMEs, package-matrix.md, setup scripts
            2. Model names in hyphen format (claude-opus-4-6, claude-sonnet-4-6)
            3. Star counts consistent for same repos across files
            4. Cross-references in Further Reading point to existing files
            5. SDK constructor patterns match actual APIs
            6. MCP SDK mentioned in every language README
            7. Feature completeness scores match documented capabilities

            Post inline comments on specific lines where inconsistencies exist.
            If clean, post a single approving comment.
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-6

  # ═══════════════════════════════════════════════════════════
  # 3. MERGE GATE (All checks must pass)
  # ═══════════════════════════════════════════════════════════
  merge-gate:
    name: Merge Gate
    needs: [claude-security, claude-consistency]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          SECURITY="${{ needs.claude-security.result }}"
          CONSISTENCY="${{ needs.claude-consistency.result }}"

          echo "Security: $SECURITY"
          echo "Consistency: $CONSISTENCY"

          if [ "$SECURITY" != "success" ] || [ "$CONSISTENCY" != "success" ]; then
            echo "::error::One or more review gates failed — merge blocked"
            exit 1
          fi

          echo "::notice::All review gates passed — PR is mergeable"
