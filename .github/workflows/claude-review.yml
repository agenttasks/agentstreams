name: Claude Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. SECURITY REVIEW (Required — blocks merge)
  # ═══════════════════════════════════════════════════════════
  claude-security:
    name: Security Review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            SECURITY REVIEW — ${{ github.repository }}#${{ github.event.pull_request.number }}

            Review ONLY the files changed in this PR (use git diff to find them).

            Check for:
            1. ANTHROPIC_API_KEY usage (only allowed in "never use" warnings)
            2. Hardcoded credentials in code examples
            3. Unsafe shell patterns (unquoted vars, eval, command injection)
            4. SQL injection in SQLite examples
            5. SSRF patterns in crawler configs
            6. Path traversal in file handling

            If issues found, post a PR comment listing them.
            If clean, post a brief approving comment.
          claude_args: |
            --max-turns 25
            --model claude-sonnet-4-6

  # ═══════════════════════════════════════════════════════════
  # 2. CONSISTENCY REVIEW (Advisory — runs in parallel)
  # ═══════════════════════════════════════════════════════════
  claude-consistency:
    name: Consistency Review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CONSISTENCY REVIEW — ${{ github.repository }}#${{ github.event.pull_request.number }}

            1. Run `git diff origin/main --name-only` to find changed files.
            2. For each changed file, check:
               - Version numbers match SKILL.md
               - Model names use hyphen format (claude-opus-4-6, claude-sonnet-4-6)
               - Cross-references point to existing files
               - SDK constructor patterns are correct
            3. Only read files that are directly referenced by the changed files.

            Post inline comments on inconsistencies. If clean, post a brief approving comment.
          claude_args: |
            --max-turns 25
            --model claude-sonnet-4-6

  # ═══════════════════════════════════════════════════════════
  # 3. MERGE GATE (Only security is blocking)
  # ═══════════════════════════════════════════════════════════
  merge-gate:
    name: Merge Gate
    needs: [claude-security, claude-consistency]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Review gate summary
        run: |
          echo "Security: ${{ needs.claude-security.result }}"
          echo "Consistency: ${{ needs.claude-consistency.result }}"
          echo "::notice::Reviews complete — check PR comments for findings"
