name: Validate Skills & Ontology

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'ontology/**'
      - 'scripts/**'
      - 'tests/**'
      - 'evals/**'
      - 'mcp-server/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-skills:
    name: Skill Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate all skills
        run: python scripts/validate-skills.py --check-only

      - name: Summary
        if: always()
        run: |
          echo "## Skill Validation" >> $GITHUB_STEP_SUMMARY
          python scripts/validate-skills.py --check-only >> $GITHUB_STEP_SUMMARY 2>&1 || true

  validate-ontology:
    name: UDA Ontology Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate ontology ↔ schema alignment
        run: python scripts/validate-ontology.py

      - name: Summary
        if: always()
        run: |
          echo "## UDA Ontology Validation" >> $GITHUB_STEP_SUMMARY
          python scripts/validate-ontology.py >> $GITHUB_STEP_SUMMARY 2>&1 || true

  python-quality:
    name: Python Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check scripts/ tests/ evals/

      - name: Format check (ruff format)
        run: uv run ruff format --check scripts/ tests/ evals/

      - name: Tests (pytest)
        run: uv run pytest tests/ -v --tb=short

      - name: Security audit
        run: uv run scripts/security-audit.py --check-only --paths scripts/ .claude/

      - name: Summary
        if: always()
        run: |
          echo "## Python Quality" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ruff check" >> $GITHUB_STEP_SUMMARY
          echo "- Format: ruff format" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: pytest" >> $GITHUB_STEP_SUMMARY
          echo "- Security: security-audit.py" >> $GITHUB_STEP_SUMMARY

  mcp-server-quality:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Tests (vitest)
        run: npx vitest run

      - name: Summary
        if: always()
        run: |
          echo "## MCP Server Quality" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: vitest" >> $GITHUB_STEP_SUMMARY
