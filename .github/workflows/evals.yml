name: Extraction Evals

on:
  pull_request:
    paths:
      - 'skills/crawl-ingest/**'
      - 'evals/**'
      - 'SKILL.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promptfoo-eval:
    name: promptfoo Extraction Evals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals/crawl-ingest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install -g promptfoo@0.121.3
          pip install anthropic

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          promptfoo eval --no-cache -o results.json
          promptfoo eval --no-cache -o results.txt --output-format text

      - name: Check results
        run: |
          PASS=$(jq '.results.stats.successes' results.json)
          FAIL=$(jq '.results.stats.failures' results.json)
          TOTAL=$((PASS + FAIL))
          echo "## Eval Results: ${PASS}/${TOTAL} passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$FAIL" -gt 0 ]; then
            echo "### Failures" >> $GITHUB_STEP_SUMMARY
            jq -r '.results.results[] | select(.success == false) | "- **\(.description // .vars.html[:50])**: \(.assertionResults[] | select(.pass == false) | .assertion.type + " — " + (.reason // "failed"))"' results.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo "::warning::${FAIL} eval(s) failed"
          else
            echo "All extraction evals passed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            evals/crawl-ingest/results.json
            evals/crawl-ingest/results.txt
