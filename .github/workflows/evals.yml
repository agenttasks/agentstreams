name: Skill Evals

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'evals/**'
  workflow_dispatch:
    inputs:
      live:
        description: 'Run live evals against Anthropic API (requires CLAUDE_CODE_OAUTH_TOKEN secret)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Config validation (always runs) ──────────────────────
  validate:
    name: Validate Eval Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate all eval configs
        run: |
          set -euo pipefail
          echo "## Eval Config Validation" >> $GITHUB_STEP_SUMMARY
          FAIL=0

          for dir in evals/*/; do
            CONFIG="${dir}promptfooconfig.yaml"
            NAME=$(basename "$dir")

            if [ ! -f "$CONFIG" ]; then
              echo "- ⚠️ ${NAME}: no promptfooconfig.yaml" >> $GITHUB_STEP_SUMMARY
              continue
            fi

            # Check config file is non-empty and valid YAML structure
            if [ ! -s "$CONFIG" ]; then
              echo "- ❌ ${NAME}: config is empty" >> $GITHUB_STEP_SUMMARY
              FAIL=1
              continue
            fi

            # Count tests and assertions
            TESTS=$(grep -c '^\s*- description:' "$CONFIG" || echo 0)
            ASSERTS=$(grep -c '^\s*- type:' "$CONFIG" || echo 0)

            # Check test_data directory exists
            if [ -d "${dir}test_data" ]; then
              FILES=$(find "${dir}test_data" -type f | wc -l)
              echo "- ✅ ${NAME}: ${TESTS} tests, ${ASSERTS} assertions, ${FILES} data files" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ ${NAME}: ${TESTS} tests, ${ASSERTS} assertions (no test_data/)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To run live evals: trigger workflow_dispatch with live=true" >> $GITHUB_STEP_SUMMARY

  # ── Live evals (workflow_dispatch only) ──────────────────
  live-eval:
    name: Live Extraction Evals
    if: github.event_name == 'workflow_dispatch' && inputs.live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install -g promptfoo@0.121.3
          pip install anthropic

      - name: Run live evals
        env:
          # Never use ANTHROPIC_API_KEY — auth flows through CLAUDE_CODE_OAUTH_TOKEN
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          echo "## Live Eval Results" >> $GITHUB_STEP_SUMMARY
          TOTAL_PASS=0
          TOTAL_FAIL=0

          for dir in evals/*/; do
            CONFIG="${dir}promptfooconfig.yaml"
            NAME=$(basename "$dir")
            [ -f "$CONFIG" ] || continue

            echo "### ${NAME}" >> $GITHUB_STEP_SUMMARY
            cd "$dir"
            promptfoo eval --no-cache -o results.json 2>&1 || true

            if [ -f results.json ]; then
              PASS=$(jq '.results.stats.successes // 0' results.json)
              FAIL=$(jq '.results.stats.failures // 0' results.json)
              TOTAL_PASS=$((TOTAL_PASS + PASS))
              TOTAL_FAIL=$((TOTAL_FAIL + FAIL))
              echo "- ${PASS} passed, ${FAIL} failed" >> "$GITHUB_STEP_SUMMARY"
              if [ "$FAIL" -gt 0 ]; then
                jq -r '.results.results[] | select(.success == false) | "  - **\(.description // "unknown")**: failed"' results.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
              fi
            else
              echo "- ⚠️ No results (promptfoo may have failed)" >> "$GITHUB_STEP_SUMMARY"
            fi
            cd "$OLDPWD"
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: ${TOTAL_PASS} passed, ${TOTAL_FAIL} failed**" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL_FAIL" -gt 0 ]; then
            echo "::warning::${TOTAL_FAIL} eval(s) failed across all suites"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: eval-results
          path: evals/*/results.json
