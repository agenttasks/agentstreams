[project]
name = "agentstreams"
version = "0.2.0"
description = "Multi-language skill system for Claude Code — Unified Data Architecture"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.10",
    "psycopg[binary]>=3.2",
    "pymupdf>=1.27.2.2",
]

[project.optional-dependencies]
crawl = [
    "scrapy>=2.11",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=1.0",
    "pytest-cov>=6.0",
    "aioresponses>=0.7",
    "ruff>=0.9",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "SIM102", "SIM108"]  # line length; keep explicit if/else for readability

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["scripts", "src"]
asyncio_mode = "auto"
